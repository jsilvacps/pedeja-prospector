services:
  - type: web
    name: pedeja-prospector
    runtime: python
    rootDir: webapp
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --workers=2 --threads=4 --timeout=120 --bind=0.0.0.0:$PORT app:app
    envVars:
      - key: GOOGLE_API_KEY
        sync: false          # você preenche no painel do Render
      - key: RENDER
        value: "true"
    autoDeploy: true
