<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="64" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="white" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background rounded rect -->
  <rect width="64" height="64" rx="14" fill="url(#g)"/>
  <!-- Top highlight gloss -->
  <rect x="0" y="0" width="64" height="34" rx="14" fill="url(#glow)"/>

  <!-- Fork (left) -->
  <!-- Tines -->
  <line x1="13" y1="11" x2="13" y2="22" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="18" y1="9"  x2="18" y2="22" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
  <line x1="23" y1="11" x2="23" y2="22" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
  <!-- Arch connecting tines to handle -->
  <path d="M13 22 Q13 28 18 29 Q23 28 23 22" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" opacity="0.9"/>
  <!-- Handle -->
  <line x1="18" y1="29" x2="18" y2="53" stroke="white" stroke-width="2.6" stroke-linecap="round" opacity="0.9"/>

  <!-- Magnifying glass (right, overlapping fork elegantly) -->
  <circle cx="41" cy="34" r="12.5" fill="rgba(255,255,255,0.08)" stroke="white" stroke-width="3" opacity="0.95"/>
  <!-- Glass glare -->
  <path d="M33.5 27 Q36 24.5 39.5 25.5" fill="none" stroke="white" stroke-width="1.6" stroke-linecap="round" opacity="0.4"/>
  <!-- Handle -->
  <line x1="50" y1="43" x2="57" y2="51" stroke="white" stroke-width="3.2" stroke-linecap="round" opacity="0.95"/>
</svg>
